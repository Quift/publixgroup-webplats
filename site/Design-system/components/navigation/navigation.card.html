<body>
<div id="root"></div>
<script type="text/babel">
const { Tabs } = window.PubliXGroupDesignSystem_c7bc72;
const labels = { open: "18 open applications awaiting a case worker.", review: "4 applications in review.", paid: "Paid this round.", archived: "Archived rounds." };
function Demo() {
  const [tab, setTab] = React.useState("open");
  return (
    <React.Fragment>
      <Tabs value={tab} onChange={setTab} items={[
        { id: "open", label: "Open", icon: "ph-tray", count: 18 },
        { id: "review", label: "In review", count: 4 },
        { id: "paid", label: "Paid" },
        { id: "archived", label: "Archived", icon: "ph-archive" },
      ]} />
      <div className="panel">{labels[tab]}</div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
