<!-- @dsCard group="Colors" viewport="700x180" name="Semantic Status" subtitle="Nordic-cool status colours with paired soft fills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-card); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; }
  .pair { display: flex; height: 60px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid rgba(14,34,64,0.08); }
  .fg { flex: 1.4; } .bg { flex: 1; }
  .badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; padding: 3px 10px; border-radius: var(--radius-pill); font-size: 12px; font-weight: 600; }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw">
      <div class="pair"><div class="fg" style="background:var(--success-600)"></div><div class="bg" style="background:var(--success-100)"></div></div>
      <span class="badge" style="background:var(--status-success-bg); color:var(--status-success-fg)"><span class="dot" style="background:var(--success-600)"></span>Grant paid</span>
      <div class="hex">#1F8A5B · #E1F3EA</div>
    </div>
    <div class="sw">
      <div class="pair"><div class="fg" style="background:var(--warning-600)"></div><div class="bg" style="background:var(--warning-100)"></div></div>
      <span class="badge" style="background:var(--status-warning-bg); color:var(--status-warning-fg)"><span class="dot" style="background:var(--warning-600)"></span>Pending review</span>
      <div class="hex">#B8791A · #FBEFD9</div>
    </div>
    <div class="sw">
      <div class="pair"><div class="fg" style="background:var(--danger-600)"></div><div class="bg" style="background:var(--danger-100)"></div></div>
      <span class="badge" style="background:var(--status-danger-bg); color:var(--status-danger-fg)"><span class="dot" style="background:var(--danger-600)"></span>Flagged</span>
      <div class="hex">#C8453B · #FBE7E5</div>
    </div>
    <div class="sw">
      <div class="pair"><div class="fg" style="background:var(--info-600)"></div><div class="bg" style="background:var(--info-100)"></div></div>
      <span class="badge" style="background:var(--status-info-bg); color:var(--status-info-fg)"><span class="dot" style="background:var(--info-600)"></span>In progress</span>
      <div class="hex">#2563D4 · #E5EFFD</div>
    </div>
  </div>
</body>
</html>
