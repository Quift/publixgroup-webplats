<!-- @dsCard group="Colors" viewport="700x176" name="Brand Navy" subtitle="The institutional core — authority, trust, the public sector" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-card); padding: 20px; }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; display: flex; flex-direction: column; }
  .chip { height: 64px; border-radius: var(--radius-sm); border: 1px solid rgba(14,34,64,0.08); }
  .name { font-size: 11px; font-weight: 600; color: var(--text-strong); margin-top: 8px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); letter-spacing: -0.01em; }
  .star { color: var(--azure-600); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--navy-950)"></div><div class="name">950</div><div class="hex">#06122A</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-900)"></div><div class="name">900</div><div class="hex">#0A1A33</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-800)"></div><div class="name">800 <span class="star">★</span></div><div class="hex">#0E2240</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-700)"></div><div class="name">700</div><div class="hex">#16335C</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-600)"></div><div class="name">600</div><div class="hex">#1E4A85</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-500)"></div><div class="name">500</div><div class="hex">#2B62AD</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-400)"></div><div class="name">400</div><div class="hex">#5285C6</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-300)"></div><div class="name">300</div><div class="hex">#8FB3DD</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-200)"></div><div class="name">200</div><div class="hex">#C3D6EC</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-100)"></div><div class="name">100</div><div class="hex">#E4EDF7</div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-50)"></div><div class="name">50</div><div class="hex">#F2F6FB</div></div>
  </div>
</body>
</html>
