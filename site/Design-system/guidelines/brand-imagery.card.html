<!-- @dsCard group="Brand" viewport="700x240" name="Imagery" subtitle="Cool, deep, human. Close, honest portraits with a navy wash — never stocky." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-card); padding: 18px; display: flex; gap: 16px; }
  .frame { position: relative; flex: 1; border-radius: var(--radius-lg); overflow: hidden; height: 204px; }
  img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .plain img { filter: none; }
  .washed::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(6,18,42,0.05) 0%, rgba(6,18,42,0.72) 100%); }
  .washed img { filter: saturate(0.9); }
  .cap { position: absolute; bottom: 12px; left: 14px; z-index: 2; font-family: var(--font-mono); font-size: 11px; color: #fff; }
  .cap.dark { color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="frame plain"><img src="../assets/imagery/hero-eye.jpg" alt=""><span class="cap dark" style="background:rgba(255,255,255,.85); padding:2px 7px; border-radius:4px;">raw</span></div>
  <div class="frame washed"><img src="../assets/imagery/hero-eye.jpg" alt=""><span class="cap">navy protection wash → text-safe</span></div>
<script src="js/forms.js"></script>
</body>
</html>
