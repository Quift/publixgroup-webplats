<!-- @dsCard group="Colors" viewport="700x176" name="Cool Slate Neutrals" subtitle="Text, surfaces and borders — cool-tinted, never pure grey" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-card); padding: 20px; }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; display: flex; flex-direction: column; }
  .chip { height: 64px; border-radius: var(--radius-sm); border: 1px solid rgba(14,34,64,0.08); }
  .name { font-size: 11px; font-weight: 600; color: var(--text-strong); margin-top: 8px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--slate-950)"></div><div class="name">950</div><div class="hex">#0B1220</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-900)"></div><div class="name">900</div><div class="hex">#161E2E</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-800)"></div><div class="name">800</div><div class="hex">#232C3D</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-700)"></div><div class="name">700</div><div class="hex">#3A4456</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-600)"></div><div class="name">600</div><div class="hex">#525C70</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-500)"></div><div class="name">500</div><div class="hex">#6B7589</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-400)"></div><div class="name">400</div><div class="hex">#8C95A6</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-300)"></div><div class="name">300</div><div class="hex">#B4BCC8</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-200)"></div><div class="name">200</div><div class="hex">#D6DBE3</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-100)"></div><div class="name">100</div><div class="hex">#EEF1F5</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-50)"></div><div class="name">50</div><div class="hex">#F6F8FA</div></div>
  </div>
<script src="js/forms.js"></script>
</body>
</html>
