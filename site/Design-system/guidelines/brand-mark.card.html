<!-- @dsCard group="Brand" viewport="700x230" name="The Mark" subtitle="Pixel-squares rising like bars — data + growth, the accelerator metaphor" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-card); padding: 28px 32px; display: flex; align-items: center; gap: 32px; }
  .big { color: var(--navy-800); }
  .big img { height: 96px; display: block; }
  .uses { display: flex; gap: 16px; align-items: center; }
  .tile { width: 64px; height: 64px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; }
  .tile.navy { background: var(--navy-800); } .tile.azure { background: var(--azure-600); }
  .tile.soft { background: var(--navy-50); border: 1px solid var(--border-default); }
  .tile img { height: 30px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); max-width: 200px; line-height: 1.6; }
</style>
</head>
<body>
  <div class="big"><img src="../assets/logo/publix-mark.svg" alt="mark"></div>
  <div class="uses">
    <div class="tile navy"><img src="../assets/logo/publix-mark-white.svg"></div>
    <div class="tile azure"><img src="../assets/logo/publix-mark-white.svg"></div>
    <div class="tile soft"><img src="../assets/logo/publix-mark-navy.svg"></div>
  </div>
  <div class="meta">publix-mark.svg<br>app icon · favicon · avatar · loading states</div>
<script src="js/forms.js"></script>
</body>
</html>
