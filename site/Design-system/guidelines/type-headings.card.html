<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-display); background: var(--surface-card); padding: 20px 24px; color: var(--text-strong); }
  .line { display: flex; align-items: baseline; gap: 14px; padding: 5px 0; border-bottom: 1px solid var(--divider); }
  .line:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); width: 116px; flex-shrink: 0; }
  h1,h2,h3,h4 { margin: 0; font-weight: 600; letter-spacing: var(--ls-snug); line-height: 1.1; }
  h1 { font-size: 34px; } h2 { font-size: 26px; } h3 { font-size: 21px; } h4 { font-size: 18px; }
</style>
</head>
<body>
  <div class="line"><span class="tag">h1 · 34 / 600</span><h1>Acceleration, not ownership</h1></div>
  <div class="line"><span class="tag">h2 · 26 / 600</span><h2>A glimpse of our impact</h2></div>
  <div class="line"><span class="tag">h3 · 21 / 600</span><h3>Application management</h3></div>
  <div class="line"><span class="tag">h4 · 18 / 600</span><h4>Shared resources across the group</h4></div>
</body>
</html>
