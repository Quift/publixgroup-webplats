<!-- @dsCard group="Spacing" viewport="700x170" name="Motion" subtitle="Calm and confident — short fades, small upward lifts, no bounce" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-card); padding: 22px 24px; color: var(--text-strong); }
  .track { position: relative; height: 30px; background: var(--slate-100); border-radius: var(--radius-pill); overflow: hidden; margin-bottom: 6px; }
  .ball { position: absolute; top: 5px; left: 5px; width: 20px; height: 20px; border-radius: 50%; background: var(--azure-600); animation: slide 2.4s infinite; }
  .e1 { animation-timing-function: var(--ease-standard); }
  .e2 { animation-timing-function: var(--ease-out); }
  @keyframes slide { 0%,12% { left: 5px; } 50%,62% { left: calc(100% - 25px); } 100% { left: 5px; } }
  .row { display: flex; align-items: center; gap: 14px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 250px; }
  @media (prefers-reduced-motion: reduce) { .ball { animation: none; } }
</style>
</head>
<body>
  <div class="row"><div class="track"><div class="ball e1"></div></div></div>
  <div class="lbl">--ease-standard · cubic-bezier(.2,0,0,1)</div>
  <div class="row"><div class="track" style="margin-top:14px"><div class="ball e2"></div></div></div>
  <div class="lbl">--ease-out · cubic-bezier(.16,1,.3,1) · fast 140 / base 220 / slow 360</div>
</body>
</html>
