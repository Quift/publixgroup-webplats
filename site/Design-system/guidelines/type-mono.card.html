<!-- @dsCard group="Type" viewport="700x190" name="Mono — IBM Plex Mono" subtitle="Figures, org-numbers, data tables, code & metadata" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-mono); background: var(--surface-card); padding: 22px 24px; color: var(--text-strong); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .stat .n { font-size: 30px; font-weight: 600; letter-spacing: -0.02em; }
  .stat .l { font-family: var(--font-text); font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); margin-top: 18px; }
  .accent { color: var(--azure-600); }
</style>
</head>
<body>
  <div class="grid">
    <div class="stat"><div class="n">€7.0M</div><div class="l">annual savings, Ostrobothnia</div></div>
    <div class="stat"><div class="n">5</div><div class="l">portfolio companies</div></div>
    <div class="stat"><div class="n accent">559485-5487</div><div class="l">org. number</div></div>
  </div>
  <div class="meta">--font-mono · 400 / 500 / 600 · tabular figures for tables &amp; IDs</div>
<script src="js/forms.js"></script>
</body>
</html>
