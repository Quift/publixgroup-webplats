<!-- @dsCard group="Data Viz" viewport="700x180" name="Diverging — Loss ↔ Gain" subtitle="Budget variance, profit/loss, over/under target — red through neutral to green" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-card); padding: 22px 24px; }
  .ramp { display: flex; height: 48px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border-subtle); }
  .ramp .step { flex: 1; }
  .lbl { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); margin: 8px 2px 0; }
  .scale { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-top: 16px; }
  .neg { color: var(--viz-negative); } .pos { color: var(--viz-positive); }
</style>
</head>
<body>
  <div class="ramp">
    <div class="step" style="background:var(--viz-div-neg-3)"></div>
    <div class="step" style="background:var(--viz-div-neg-2)"></div>
    <div class="step" style="background:var(--viz-div-neg-1)"></div>
    <div class="step" style="background:var(--viz-div-mid)"></div>
    <div class="step" style="background:var(--viz-div-pos-1)"></div>
    <div class="step" style="background:var(--viz-div-pos-2)"></div>
    <div class="step" style="background:var(--viz-div-pos-3)"></div>
  </div>
  <div class="lbl"><span>--viz-div-neg-3</span><span>--viz-div-mid</span><span>--viz-div-pos-3</span></div>
  <div class="scale"><span class="neg">−18% under budget</span><span>on target</span><span class="pos">+18% surplus</span></div>
<script src="js/forms.js"></script>
</body>
</html>
