<!-- @dsCard group="Data Viz" viewport="700x190" name="Finance Semantics" subtitle="Fixed meanings — gain, loss, benchmark, forecast + chart chrome" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-card); padding: 22px 24px; display: grid; grid-template-columns: 1.1fr 1fr; gap: 28px; }
  .item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .dot { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; }
  .line { width: 22px; height: 0; flex-shrink: 0; }
  .k { font-size: 13px; color: var(--text-body); font-weight: 500; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); margin-left: auto; }
  h5 { font-family: var(--font-display); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-subtle); margin: 0 0 14px; font-weight: 700; }
</style>
</head>
<body>
  <div>
    <h5>Semantics</h5>
    <div class="item"><span class="dot" style="background:var(--viz-positive)"></span><span class="k">Gain / surplus / paid</span><span class="tok">--viz-positive</span></div>
    <div class="item"><span class="dot" style="background:var(--viz-negative)"></span><span class="k">Loss / deficit / overdue</span><span class="tok">--viz-negative</span></div>
    <div class="item"><span class="dot" style="background:var(--viz-neutral)"></span><span class="k">No change / n.a.</span><span class="tok">--viz-neutral</span></div>
    <div class="item"><span class="line" style="border-top:3px solid var(--viz-benchmark)"></span><span class="k">Benchmark / target</span><span class="tok">--viz-benchmark</span></div>
    <div class="item"><span class="line" style="border-top:3px dashed var(--viz-forecast)"></span><span class="k">Forecast (dashed)</span><span class="tok">--viz-forecast</span></div>
  </div>
  <div>
    <h5>Chart chrome</h5>
    <div class="item"><span class="dot" style="background:var(--viz-grid);border:1px solid var(--border-subtle)"></span><span class="k">Gridlines</span><span class="tok">--viz-grid</span></div>
    <div class="item"><span class="dot" style="background:var(--viz-axis)"></span><span class="k">Axis &amp; ticks</span><span class="tok">--viz-axis</span></div>
    <div class="item"><span class="dot" style="background:var(--viz-axis-label)"></span><span class="k">Axis labels</span><span class="tok">--viz-axis-label</span></div>
    <div class="item"><span class="dot" style="background:var(--viz-tooltip-bg)"></span><span class="k">Tooltip surface</span><span class="tok">--viz-tooltip-bg</span></div>
  </div>
</body>
</html>
