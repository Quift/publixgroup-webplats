<!-- @dsCard group="Spacing" viewport="700x190" name="Elevation" subtitle="Cool navy-tinted shadows — low and honest" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-page); padding: 26px 22px; display: flex; gap: 20px; }
  .item { text-align: center; }
  .box { width: 96px; height: 72px; background: var(--surface-card); border-radius: var(--radius-md); }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="tok">shadow-xs</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="tok">shadow-sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="tok">shadow-md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="tok">shadow-lg</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="tok">shadow-xl</div></div>
</body>
</html>
