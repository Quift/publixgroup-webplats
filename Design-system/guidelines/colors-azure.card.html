<!-- @dsCard group="Colors" viewport="700x176" name="Action Azure" subtitle="The digital signal — buttons, links, focus. Used sparingly." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-card); padding: 20px; }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; display: flex; flex-direction: column; }
  .chip { height: 70px; border-radius: var(--radius-sm); border: 1px solid rgba(14,34,64,0.08); }
  .name { font-size: 11px; font-weight: 600; color: var(--text-strong); margin-top: 8px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); }
  .role { font-size: 10px; color: var(--text-subtle); margin-top: 1px; }
  .star { color: var(--azure-600); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--azure-700)"></div><div class="name">azure-700</div><div class="hex">#1B53C0</div><div class="role">hover / pressed</div></div>
    <div class="sw"><div class="chip" style="background:var(--azure-600)"></div><div class="name">azure-600 <span class="star">★</span></div><div class="hex">#2563D4</div><div class="role">primary action</div></div>
    <div class="sw"><div class="chip" style="background:var(--azure-500)"></div><div class="name">azure-500</div><div class="hex">#3B7BEA</div><div class="role">focus ring</div></div>
    <div class="sw"><div class="chip" style="background:var(--azure-300)"></div><div class="name">azure-300</div><div class="hex">#94BCF4</div><div class="role">on navy</div></div>
    <div class="sw"><div class="chip" style="background:var(--azure-100); border-color:var(--azure-300)"></div><div class="name">azure-100</div><div class="hex">#E5EFFD</div><div class="role">soft fill</div></div>
  </div>
</body>
</html>
