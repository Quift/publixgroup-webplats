<!-- @dsCard group="Data Viz" viewport="700x210" name="Categorical Series" subtitle="Up to 8 qualitative series — azure first, then maximally separated hues" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-card); padding: 20px 24px; }
  .row { display: flex; gap: 8px; margin-bottom: 16px; }
  .sw { flex: 1; }
  .chip { height: 46px; border-radius: var(--radius-sm); }
  .name { font-size: 11px; font-weight: 600; color: var(--text-strong); margin-top: 7px; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); }
  /* stacked bar preview */
  .bars { display: flex; flex-direction: column; gap: 7px; }
  .bar { display: flex; height: 20px; border-radius: 4px; overflow: hidden; }
  .seg { height: 100%; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); margin-top: 10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--viz-cat-1)"></div><div class="name">Series 1</div><div class="tok">--viz-cat-1</div></div>
    <div class="sw"><div class="chip" style="background:var(--viz-cat-2)"></div><div class="name">Series 2</div><div class="tok">--viz-cat-2</div></div>
    <div class="sw"><div class="chip" style="background:var(--viz-cat-3)"></div><div class="name">Series 3</div><div class="tok">--viz-cat-3</div></div>
    <div class="sw"><div class="chip" style="background:var(--viz-cat-4)"></div><div class="name">Series 4</div><div class="tok">--viz-cat-4</div></div>
    <div class="sw"><div class="chip" style="background:var(--viz-cat-5)"></div><div class="name">Series 5</div><div class="tok">--viz-cat-5</div></div>
    <div class="sw"><div class="chip" style="background:var(--viz-cat-6)"></div><div class="name">Series 6</div><div class="tok">--viz-cat-6</div></div>
    <div class="sw"><div class="chip" style="background:var(--viz-cat-7)"></div><div class="name">Series 7</div><div class="tok">--viz-cat-7</div></div>
    <div class="sw"><div class="chip" style="background:var(--viz-cat-8)"></div><div class="name">Series 8</div><div class="tok">--viz-cat-8</div></div>
  </div>
  <div class="bars">
    <div class="bar">
      <div class="seg" style="flex:5;background:var(--viz-cat-1)"></div>
      <div class="seg" style="flex:3;background:var(--viz-cat-2)"></div>
      <div class="seg" style="flex:2.2;background:var(--viz-cat-3)"></div>
      <div class="seg" style="flex:1.6;background:var(--viz-cat-4)"></div>
      <div class="seg" style="flex:1.1;background:var(--viz-cat-5)"></div>
      <div class="seg" style="flex:0.8;background:var(--viz-cat-8)"></div>
    </div>
  </div>
  <div class="cap">Stacked composition — e.g. grant volume by sector. Soft tints (--viz-cat-N-soft) for area fills &amp; legends.</div>
</body>
</html>
