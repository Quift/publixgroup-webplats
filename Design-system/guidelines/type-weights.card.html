<!-- @dsCard group="Type" viewport="700x150" name="Eyebrow & Weights" subtitle="Uppercase eyebrows and the working weight range" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-text); background: var(--surface-card); padding: 20px 24px; color: var(--text-strong); display:flex; flex-direction:column; gap:14px; }
  .eyebrow { font-family: var(--font-display); text-transform: uppercase; letter-spacing: var(--ls-overline); font-size: 12px; font-weight: 700; color: var(--azure-600); }
  .weights { display: flex; gap: 22px; align-items: baseline; }
  .weights span { font-family: var(--font-display); font-size: 26px; }
  .w4 { font-weight: 400; } .w5 { font-weight: 500; } .w6 { font-weight: 600; } .w7 { font-weight: 700; } .w8 { font-weight: 800; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); display:block; text-align:center; margin-top:2px; font-weight:400;}
  .wrap { text-align:center; }
</style>
</head>
<body>
  <div class="eyebrow">Our companies · How we work</div>
  <div class="weights">
    <div class="wrap"><span class="w4">Aa</span><span class="cap">400</span></div>
    <div class="wrap"><span class="w5">Aa</span><span class="cap">500</span></div>
    <div class="wrap"><span class="w6">Aa</span><span class="cap">600</span></div>
    <div class="wrap"><span class="w7">Aa</span><span class="cap">700</span></div>
    <div class="wrap"><span class="w8">Aa</span><span class="cap">800</span></div>
  </div>
</body>
</html>
