  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>PubliX Group — Brand at a glance<\u002Ftitle>\n<style>/* PubliX Group — global stylesheet entrypoint.\n   Consumers link THIS file only. Keep it a list of @imports. */\n/* ===========================================================================\n   PubliX Group — Web fonts\n   Display : Sora            (geometric, technological — the \"digital\" voice)\n   Text/UI : Hanken Grotesk  (humanist grotesk — the \"human / welfare\" voice)\n   Mono    : IBM Plex Mono   (figures, data, code, org-numbers)\n   Sora & Hanken ship as variable woff2 (weight 100–900).\n   =========================================================================== */\n\n@font-face {\n  font-family: \"Sora\";\n  src: url(\"cfc2a986-faa9-4b24-a95e-ed4549c0f4cc\") format(\"woff2\");\n  font-weight: 100 900;\n  font-style: normal;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"Hanken Grotesk\";\n  src: url(\"fc53e62c-e6c8-4513-8775-9b9df3a36508\") format(\"woff2\");\n  font-weight: 100 900;\n  font-style: normal;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"IBM Plex Mono\";\n  src: url(\"0bf5fe22-6644-4f84-8d18-0ce73182ccff\") format(\"woff2\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"IBM Plex Mono\";\n  src: url(\"bea9dde1-f603-4737-b679-05dda1a6008c\") format(\"woff2\");\n  font-weight: 500;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"IBM Plex Mono\";\n  src: url(\"eee6dc85-c98d-47e4-ad97-a930738feb87\") format(\"woff2\");\n  font-weight: 600;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* ===========================================================================\n   PubliX Group — Colour tokens\n   ---------------------------------------------------------------------------\n   The brand is navy-led, cool and institutional. Navy carries authority and\n   trust (public sector); a single bright Azure is the digital \"signal\" / action\n   colour; cool slate neutrals keep surfaces calm; semantics are tuned Nordic-cool.\n   Portfolio companies own their own colours — PubliX itself stays navy + neutral.\n   =========================================================================== */\n\n:root {\n  /* ---- Brand: Navy ------------------------------------------------------- */\n  --navy-950: #06122A; /* near-black navy — deepest backgrounds, hero wash */\n  --navy-900: #0A1A33; /* primary dark surface */\n  --navy-800: #0E2240; /* PRIMARY BRAND NAVY — logo, headings on light */\n  --navy-700: #16335C;\n  --navy-600: #1E4A85;\n  --navy-500: #2B62AD; /* mid civic blue */\n  --navy-400: #5285C6;\n  --navy-300: #8FB3DD;\n  --navy-200: #C3D6EC;\n  --navy-100: #E4EDF7;\n  --navy-50:  #F2F6FB;\n\n  /* ---- Action: Azure (the digital signal) -------------------------------- */\n  --azure-700: #1B53C0;\n  --azure-600: #2563D4; /* PRIMARY ACTION — buttons, links, focus */\n  --azure-500: #3B7BEA;\n  --azure-300: #94BCF4;\n  --azure-100: #E5EFFD;\n\n  /* ---- Neutral: cool slate ----------------------------------------------- */\n  --slate-950: #0B1220;\n  --slate-900: #161E2E;\n  --slate-800: #232C3D;\n  --slate-700: #3A4456;\n  --slate-600: #525C70;\n  --slate-500: #6B7589;\n  --slate-400: #8C95A6;\n  --slate-300: #B4BCC8;\n  --slate-200: #D6DBE3;\n  --slate-150: #E4E8EE;\n  --slate-100: #EEF1F5;\n  --slate-50:  #F6F8FA;\n  --white:     #FFFFFF;\n\n  /* ---- Semantic: Nordic-cool --------------------------------------------- */\n  --success-600: #1F8A5B; /* paid grant, healthy, complete */\n  --success-100: #E1F3EA;\n  --warning-600: #B8791A; /* pending, attention */\n  --warning-100: #FBEFD9;\n  --danger-600:  #C8453B; /* error, fraud flag, overdue */\n  --danger-100:  #FBE7E5;\n  --info-600:    #2563D4;\n  --info-100:    #E5EFFD;\n\n  /* =========================================================================\n     SEMANTIC ALIASES — prefer these in product & component code\n     ========================================================================= */\n\n  /* Text */\n  --text-strong:   var(--navy-800);  /* headings, key figures */\n  --text-body:     var(--slate-800); /* default paragraph */\n  --text-muted:    var(--slate-600); /* secondary, captions */\n  --text-subtle:   var(--slate-500); /* meta, placeholders */\n  --text-on-navy:  var(--white);     /* text on dark navy surfaces */\n  --text-on-navy-muted: var(--navy-200);\n  --text-link:     var(--azure-600);\n  --text-inverse:  var(--white);\n\n  /* Surfaces */\n  --surface-page:    var(--slate-50);  /* app background */\n  --surface-card:    var(--white);     /* cards, panels */\n  --surface-raised:  var(--white);\n  --surface-sunken:  var(--slate-100); /* wells, inputs at rest */\n  --surface-navy:    var(--navy-800);  /* hero / footer / dark sections */\n  --surface-navy-deep: var(--navy-950);\n  --surface-accent-soft: var(--navy-50);\n\n  /* Borders & lines */\n  --border-subtle:  var(--slate-150);\n  --border-default: var(--slate-200);\n  --border-strong:  var(--slate-300);\n  --border-navy:    rgba(255, 255, 255, 0.14); /* hairlines on navy */\n  --divider:        var(--slate-150);\n\n  /* Brand / action */\n  --brand:          var(--navy-800);\n  --brand-contrast: var(--white);\n  --action:         var(--azure-600);\n  --action-hover:   var(--azure-700);\n  --action-soft:    var(--azure-100);\n  --focus-ring:     var(--azure-500);\n\n  /* Status surfaces */\n  --status-success-fg: var(--success-600);\n  --status-success-bg: var(--success-100);\n  --status-warning-fg: var(--warning-600);\n  --status-warning-bg: var(--warning-100);\n  --status-danger-fg:  var(--danger-600);\n  --status-danger-bg:  var(--danger-100);\n  --status-info-fg:    var(--info-600);\n  --status-info-bg:    var(--info-100);\n}\n\n/* ===========================================================================\n   PubliX Group — Typography tokens\n   Sora (display) is reserved for headlines, big numbers and the wordmark voice.\n   Hanken Grotesk (text) carries everything readable. Plex Mono for data.\n   Scale is a ~1.20 minor-third on a 16px base, hand-tuned at the top end.\n   =========================================================================== */\n\n:root {\n  /* Families */\n  --font-display: \"Sora\", \"Hanken Grotesk\", system-ui, sans-serif;\n  --font-text:    \"Hanken Grotesk\", system-ui, -apple-system, \"Segoe UI\", sans-serif;\n  --font-mono:    \"IBM Plex Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n\n  /* Weights */\n  --fw-regular:  400; /* @kind font */\n  --fw-medium:   500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold:     700; /* @kind font */\n  --fw-extra:    800; /* @kind font */\n\n  /* Type scale (font-size) */\n  --fs-display-2xl: 4.5rem;   /* 72 — hero on web */\n  --fs-display-xl:  3.5rem;   /* 56 */\n  --fs-display-lg:  2.75rem;  /* 44 */\n  --fs-h1:          2.125rem; /* 34 */\n  --fs-h2:          1.625rem; /* 26 */\n  --fs-h3:          1.3125rem;/* 21 */\n  --fs-h4:          1.125rem; /* 18 */\n  --fs-body-lg:     1.125rem; /* 18 */\n  --fs-body:        1rem;     /* 16 */\n  --fs-body-sm:     0.9375rem;/* 15 */\n  --fs-caption:     0.8125rem;/* 13 */\n  --fs-overline:    0.75rem;  /* 12 */\n\n  /* Line heights */\n  --lh-tight:    1.05;  /* @kind font */\n  --lh-heading:  1.15;  /* @kind font */\n  --lh-snug:     1.3;   /* @kind font */\n  --lh-body:     1.55;  /* @kind font */\n  --lh-relaxed:  1.7;   /* @kind font */\n\n  /* Letter spacing */\n  --ls-tight:    -0.02em; /* @kind font */\n  --ls-snug:     -0.01em; /* @kind font */\n  --ls-normal:   0;       /* @kind font */\n  --ls-wide:     0.02em;  /* @kind font */\n  --ls-overline: 0.14em;  /* @kind font */\n\n  /* Semantic roles */\n  --text-display-font: var(--font-display);\n  --text-display-weight: var(--fw-bold);\n  --text-heading-font: var(--font-display);\n  --text-heading-weight: var(--fw-semibold);\n  --text-body-font: var(--font-text);\n  --text-body-weight: var(--fw-regular);\n  --text-eyebrow-transform: uppercase;\n  --text-eyebrow-spacing: var(--ls-overline);\n}\n\n/* ===========================================================================\n   PubliX Group — Spacing tokens\n   4px base grid. Use --space-* for padding/margin/gap. Layout widths below.\n   =========================================================================== */\n\n:root {\n  --space-0:   0;\n  --space-1:   0.25rem;  /* 4  */\n  --space-2:   0.5rem;   /* 8  */\n  --space-3:   0.75rem;  /* 12 */\n  --space-4:   1rem;     /* 16 */\n  --space-5:   1.25rem;  /* 20 */\n  --space-6:   1.5rem;   /* 24 */\n  --space-8:   2rem;     /* 32 */\n  --space-10:  2.5rem;   /* 40 */\n  --space-12:  3rem;     /* 48 */\n  --space-16:  4rem;     /* 64 */\n  --space-20:  5rem;     /* 80 */\n  --space-24:  6rem;     /* 96 */\n  --space-32:  8rem;     /* 128 */\n\n  /* Layout */\n  --container-max:   1200px; /* marketing site content width */\n  --container-text:  720px;  /* readable prose measure */\n  --container-wide:  1320px;\n  --gutter:          var(--space-6);\n  --section-y:       var(--space-24); /* vertical rhythm between sections */\n\n  /* Component sizing */\n  --control-h-sm:  34px;\n  --control-h-md:  42px;\n  --control-h-lg:  52px;\n}\n\n/* ===========================================================================\n   PubliX Group — Radius tokens\n   The brand mark is built from squares with a small soft radius (≈2.5/8 ≈ 0.31).\n   Corners are restrained and squared-off, never pill-soft (except true pills).\n   =========================================================================== */\n\n:root {\n  --radius-xs:   3px;   /* tags, chips, the pixel-square feel */\n  --radius-sm:   6px;   /* inputs, small buttons */\n  --radius-md:   10px;  /* buttons, cards */\n  --radius-lg:   16px;  /* large cards, panels, media */\n  --radius-xl:   24px;  /* hero media, feature blocks */\n  --radius-pill: 999px; /* avatars, toggles, status dots */\n}\n\n/* ===========================================================================\n   PubliX Group — Elevation / shadow tokens\n   Shadows are cool-tinted (navy, not black) and soft. Institutional UIs lean\n   on borders first, shadow second. Keep elevation low and honest.\n   =========================================================================== */\n\n:root {\n  /* Cool navy-tinted shadows */\n  --shadow-xs:  0 1px 2px rgba(14, 34, 64, 0.06);\n  --shadow-sm:  0 1px 2px rgba(14, 34, 64, 0.06), 0 1px 3px rgba(14, 34, 64, 0.08);\n  --shadow-md:  0 4px 10px rgba(14, 34, 64, 0.08), 0 1px 3px rgba(14, 34, 64, 0.06);\n  --shadow-lg:  0 12px 28px rgba(14, 34, 64, 0.12), 0 2px 6px rgba(14, 34, 64, 0.06);\n  --shadow-xl:  0 28px 60px rgba(6, 18, 42, 0.20), 0 6px 16px rgba(6, 18, 42, 0.10);\n\n  /* Focus ring (paired with --focus-ring colour) */\n  --ring-width: 3px; /* @kind other */\n  --ring-offset: 2px; /* @kind other */\n  --ring: 0 0 0 var(--ring-width) rgba(59, 123, 234, 0.45);\n\n  /* Inset (sunken inputs/wells) */\n  --shadow-inset: inset 0 1px 2px rgba(14, 34, 64, 0.06);\n}\n\n/* ===========================================================================\n   PubliX Group — Motion tokens\n   Calm, confident, never bouncy. Short fades + small upward translates.\n   Public-sector software should feel steady and trustworthy.\n   =========================================================================== */\n\n:root {\n  --ease-standard: cubic-bezier(0.2, 0, 0, 1);     /* @kind other */\n  --ease-out:      cubic-bezier(0.16, 1, 0.3, 1);  /* @kind other */\n  --ease-in-out:   cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */\n\n  --dur-instant: 80ms;  /* @kind other */\n  --dur-fast:    140ms;  /* @kind other */\n  --dur-base:    220ms;  /* @kind other */\n  --dur-slow:    360ms;  /* @kind other */\n  --dur-entrance:520ms;  /* @kind other */\n\n  --lift-hover: -2px;    /* @kind other */\n  --press-scale: 0.98;   /* @kind other */\n}\n\n/* ===========================================================================\n   PubliX Group — Data-visualization tokens\n   ---------------------------------------------------------------------------\n   PubliX's portfolio runs on financial & operational data — grants paid,\n   budgets, shift coverage, savings. Charts therefore need a dedicated,\n   brand-cohesive palette beyond the UI semantics.\n\n   Four sub-systems:\n     1. CATEGORICAL  — up to 8 qualitative series (distinct hues)\n     2. SEQUENTIAL   — single-hue ramps for magnitude / heatmaps (azure, teal)\n     3. DIVERGING    — loss ↔ neutral ↔ gain, for budget/variance/profit-loss\n     4. FINANCE      — fixed semantics: positive / negative / benchmark / forecast\n   Plus chart chrome (grid, axis, tooltip).\n\n   All hues are tuned to read on white and to sit with navy + azure. Order of\n   the categorical series is deliberate: brand azure first, then maximally\n   separated hues, ending on muted steel.  NOTE: provisional palette — pending\n   the reference colour scheme; tune hues here and every chart updates.\n   =========================================================================== */\n\n:root {\n  /* ---- 1. Categorical (qualitative series) ------------------------------- */\n  --viz-cat-1: #2563D4; /* azure   — primary series (brand action) */\n  --viz-cat-2: #119A8B; /* teal    */\n  --viz-cat-3: #E0A12E; /* amber   */\n  --viz-cat-4: #6D5BD0; /* violet  */\n  --viz-cat-5: #2E8C57; /* green   */\n  --viz-cat-6: #E2664E; /* coral   */\n  --viz-cat-7: #C2487E; /* magenta */\n  --viz-cat-8: #5B7DA6; /* steel   — muted closer, good for \"other\" */\n\n  /* soft fills (≈12% tints) for area/stacked backgrounds & legends */\n  --viz-cat-1-soft: #E4ECFB;\n  --viz-cat-2-soft: #DEF1EF;\n  --viz-cat-3-soft: #FAEFD8;\n  --viz-cat-4-soft: #E8E4F8;\n  --viz-cat-5-soft: #E2F1E9;\n  --viz-cat-6-soft: #FBE6E1;\n  --viz-cat-7-soft: #F7E1EC;\n  --viz-cat-8-soft: #E6ECF3;\n\n  /* ---- 2. Sequential ramps (low → high) ---------------------------------- */\n  /* Azure/navy — the default magnitude ramp (e.g. volume, intensity) */\n  --viz-seq-azure-1: #E4EDF7;\n  --viz-seq-azure-2: #BBD2EE;\n  --viz-seq-azure-3: #8FB3DD;\n  --viz-seq-azure-4: #5285C6;\n  --viz-seq-azure-5: #2B62AD;\n  --viz-seq-azure-6: #1B4585;\n  --viz-seq-azure-7: #0E2240;\n\n  /* Teal — alternate ramp for a second metric on one view */\n  --viz-seq-teal-1: #E0F2F0;\n  --viz-seq-teal-2: #A9DDD7;\n  --viz-seq-teal-3: #6FC6BC;\n  --viz-seq-teal-4: #2FA597;\n  --viz-seq-teal-5: #1B7E73;\n  --viz-seq-teal-6: #0E574F;\n\n  /* ---- 3. Diverging (loss ↔ neutral ↔ gain) ------------------------------ */\n  --viz-div-neg-3: #A8322A; /* worst  */\n  --viz-div-neg-2: #D2604F;\n  --viz-div-neg-1: #F0A99E;\n  --viz-div-mid:   #EAECEF; /* zero / no variance */\n  --viz-div-pos-1: #8FCBAE;\n  --viz-div-pos-2: #3FA976;\n  --viz-div-pos-3: #1B7A50; /* best   */\n\n  /* ---- 4. Finance semantics (fixed meaning) ------------------------------ */\n  --viz-positive:      #1F8A5B; /* gain, surplus, paid, on-budget */\n  --viz-positive-soft: #E1F3EA;\n  --viz-negative:      #C8453B; /* loss, deficit, overdue, over-budget */\n  --viz-negative-soft: #FBE7E5;\n  --viz-neutral:       #6B7589; /* no change / not applicable */\n  --viz-benchmark:     #0E2240; /* target / benchmark line (navy) */\n  --viz-forecast:      #2563D4; /* projected / forecast (azure, usually dashed) */\n\n  /* ---- Chart chrome ------------------------------------------------------ */\n  --viz-grid:        #E4E8EE; /* gridlines */\n  --viz-grid-strong: #D6DBE3; /* zero/baseline */\n  --viz-axis:        #B4BCC8; /* axis lines & ticks */\n  --viz-axis-label:  #6B7589; /* axis & tick labels */\n  --viz-plot-bg:     #FFFFFF; /* plot area */\n  --viz-tooltip-bg:  #0A1A33; /* navy-900 */\n  --viz-tooltip-fg:  #FFFFFF;\n}\n\n<\u002Fstyle>\n\n<style>\n  *, *::before, *::after { box-sizing: border-box; }\n  body { margin: 0; font-family: var(--font-text); color: var(--text-body); background: var(--slate-100); -webkit-font-smoothing: antialiased; }\n  .doc { max-width: 920px; margin: 0 auto; background: var(--surface-card); box-shadow: 0 1px 40px rgba(6,18,42,0.10); }\n  .pad { padding: 56px 64px; }\n  .eyebrow { font-family: var(--font-display); font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: var(--ls-overline); }\n  h2 { font-family: var(--font-display); font-weight: 600; font-size: var(--fs-h1); letter-spacing: var(--ls-tight); color: var(--text-strong); margin: 0 0 6px; }\n  .lead { font-size: var(--fs-body-lg); line-height: var(--lh-body); color: var(--text-muted); margin: 0 0 32px; max-width: 60ch; }\n  .section-k { color: var(--azure-600); margin-bottom: 14px; display: block; }\n\n  /* HERO */\n  .hero { position: relative; background: var(--navy-950); overflow: hidden; }\n  .hero__pattern { position: absolute; right: 0; bottom: 0; height: 78%; opacity: 0.45; }\n  .hero__inner { position: relative; z-index: 1; padding: 64px 64px 72px; }\n  .hero__logo { height: 38px; margin-bottom: 56px; }\n  .hero__eyebrow { color: var(--azure-300); margin-bottom: 18px; }\n  .hero__title { font-family: var(--font-display); font-weight: 700; font-size: var(--fs-display-lg); line-height: 1.06; letter-spacing: var(--ls-tight); color: #fff; margin: 0 0 18px; max-width: 16ch; }\n  .hero__sub { font-size: var(--fs-body-lg); line-height: var(--lh-body); color: var(--navy-200); margin: 0; max-width: 50ch; }\n\n  /* IDEA + mark */\n  .idea { display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; align-items: center; border-bottom: 1px solid var(--divider); }\n  .idea p { font-size: var(--fs-body-lg); line-height: var(--lh-body); color: var(--text-body); margin: 0 0 14px; }\n  .idea strong { color: var(--navy-800); font-weight: var(--fw-semibold); }\n  .markbox { background: var(--navy-50); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 32px; text-align: center; color: var(--navy-800); }\n  .markbox img { height: 84px; }\n  .markbox .cap { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); margin-top: 16px; }\n\n  /* swatch grids */\n  .swrow { display: flex; gap: 8px; margin-bottom: 8px; }\n  .sw { flex: 1; }\n  .sw .chip { height: 52px; border-radius: var(--radius-sm); border: 1px solid rgba(14,34,64,0.06); }\n  .sw .n { font-size: 10px; font-weight: 600; color: var(--text-strong); margin-top: 6px; }\n  .sw .h { font-family: var(--font-mono); font-size: 9px; color: var(--text-subtle); }\n  .blockgap { margin-bottom: 30px; }\n  .minittl { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--text-strong); margin: 0 0 12px; }\n\n  /* dataviz */\n  .grayband { background: var(--slate-50); border-top: 1px solid var(--divider); border-bottom: 1px solid var(--divider); }\n  .viz-cats { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }\n  .viz-cats .c { height: 46px; border-radius: var(--radius-sm); }\n  .div { display: flex; height: 38px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border-subtle); }\n  .div span { flex: 1; }\n  .divlbl { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin-top: 10px; }\n  .charts { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; margin-top: 8px; }\n  .panel { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: var(--shadow-sm); }\n  .panel .pt { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--text-strong); margin: 0 0 12px; }\n  .legend { display: flex; flex-wrap: wrap; gap: 5px 12px; margin-top: 8px; }\n  .lg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-body); }\n  .lg .d { width: 9px; height: 9px; border-radius: 2px; }\n  .lg .v { font-family: var(--font-mono); font-weight: 600; }\n  text { font-family: var(--font-mono); }\n\n  /* type */\n  .typespec { border-bottom: 1px solid var(--divider); }\n  .type-display { font-family: var(--font-display); font-weight: 700; font-size: 46px; letter-spacing: var(--ls-tight); color: var(--text-strong); line-height: 1.04; margin: 0 0 4px; }\n  .type-meta { font-family: var(--font-mono); font-size: 12px; color: var(--text-subtle); margin-bottom: 26px; }\n  .type-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }\n  .type-body { font-size: 16px; line-height: 1.6; color: var(--text-body); }\n  .type-tag { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--navy-700); margin-bottom: 8px; }\n\n  /* component preview */\n  .btnrow { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }\n  .b { display: inline-flex; align-items: center; height: 42px; padding: 0 18px; border-radius: var(--radius-md); font-family: var(--font-text); font-weight: 600; font-size: 15px; border: 1px solid transparent; }\n  .b-pri { background: var(--navy-800); color: #fff; }\n  .b-acc { background: var(--azure-600); color: #fff; }\n  .b-sec { background: #fff; color: var(--navy-800); border-color: var(--border-strong); }\n  .b-ghost { background: transparent; color: var(--navy-700); }\n  .badges { display: flex; gap: 8px; flex-wrap: wrap; }\n  .bd { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; padding: 4px 11px; border-radius: var(--radius-pill); }\n  .bd .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }\n\n  /* footer */\n  .foot { background: var(--surface-navy-deep); color: var(--navy-200); padding: 44px 64px; display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; flex-wrap: wrap; }\n  .foot img { height: 28px; margin-bottom: 14px; }\n  .foot p { font-size: 13px; line-height: 1.6; margin: 0; color: var(--navy-300); }\n  .foot .org { font-family: var(--font-mono); font-size: 11px; color: var(--navy-400); margin-top: 10px; }\n  .foot .addr { text-align: right; font-size: 13px; color: var(--navy-200); line-height: 1.7; }\n\n  @media (max-width: 720px) {\n    .pad, .hero__inner, .foot { padding-left: 28px; padding-right: 28px; }\n    .idea, .type-pair, .charts { grid-template-columns: 1fr; }\n    .viz-cats { grid-template-columns: repeat(4, 1fr); }\n    .foot .addr { text-align: left; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"doc\">\n\n  <!-- HERO -->\n  <header class=\"hero\">\n    <img class=\"hero__pattern\" src=\"09a17f58-c4ee-4f37-9989-8123019e5b9c\" alt=\"\">\n    <div class=\"hero__inner\">\n      <img class=\"hero__logo\" src=\"68434d6c-da4e-4767-b165-4810c96feea6\" alt=\"PubliX Group\">\n      <span class=\"eyebrow hero__eyebrow\">Brand at a glance · 2026<\u002Fspan>\n      <h1 class=\"hero__title\">A brand for the future of public services<\u002Fh1>\n      <p class=\"hero__sub\">Our visual system — navy-led, precise and human — built to present mission-critical public-sector data with clarity and trust.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- IDEA -->\n  <section class=\"pad idea\">\n    <div>\n      <span class=\"eyebrow section-k\">The idea<\u002Fspan>\n      <h2>Data, turning into progress<\u002Fh2>\n      <p>PubliX Group unites founder-led SaaS companies to modernise public services across the Nordics. The mark is built from pixel-squares that <strong>rise like a bar chart<\u002Fstrong> — data becoming momentum, the accelerator at work.<\u002Fp>\n      <p>Everything else stays calm and squared-off: deep navy for authority, a single bright azure for action, and a disciplined palette engineered for charts and financial reporting.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"markbox\">\n      <img src=\"985f7292-8311-4184-ba74-43b45ac0fdf2\" alt=\"PubliX mark\">\n      <div class=\"cap\">the mark<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- COLOUR -->\n  <section class=\"pad\">\n    <span class=\"eyebrow section-k\">Core colour<\u002Fspan>\n    <h2>A navy core, an azure spark<\u002Fh2>\n    <p class=\"lead\">Navy carries trust and authority; one azure is the digital signal for action and links. Cool slate neutrals keep everything quiet.<\u002Fp>\n\n    <div class=\"blockgap\">\n      <div class=\"minittl\">Brand navy<\u002Fdiv>\n      <div class=\"swrow\">\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--navy-950)\"><\u002Fdiv><div class=\"n\">950<\u002Fdiv><div class=\"h\">#06122A<\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--navy-800)\"><\u002Fdiv><div class=\"n\">800 ★<\u002Fdiv><div class=\"h\">#0E2240<\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--navy-600)\"><\u002Fdiv><div class=\"n\">600<\u002Fdiv><div class=\"h\">#1E4A85<\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--navy-400)\"><\u002Fdiv><div class=\"n\">400<\u002Fdiv><div class=\"h\">#5285C6<\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--navy-200)\"><\u002Fdiv><div class=\"n\">200<\u002Fdiv><div class=\"h\">#C3D6EC<\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--navy-50)\"><\u002Fdiv><div class=\"n\">50<\u002Fdiv><div class=\"h\">#F2F6FB<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"blockgap\">\n      <div class=\"minittl\">Action azure &amp; status<\u002Fdiv>\n      <div class=\"swrow\">\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--azure-600)\"><\u002Fdiv><div class=\"n\">azure ★<\u002Fdiv><div class=\"h\">#2563D4<\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--azure-100); border-color:var(--azure-300)\"><\u002Fdiv><div class=\"n\">azure-100<\u002Fdiv><div class=\"h\">#E5EFFD<\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--success-600)\"><\u002Fdiv><div class=\"n\">success<\u002Fdiv><div class=\"h\">#1F8A5B<\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--warning-600)\"><\u002Fdiv><div class=\"n\">warning<\u002Fdiv><div class=\"h\">#B8791A<\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--danger-600)\"><\u002Fdiv><div class=\"n\">danger<\u002Fdiv><div class=\"h\">#C8453B<\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--slate-500)\"><\u002Fdiv><div class=\"n\">slate<\u002Fdiv><div class=\"h\">#6B7589<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- DATA COLOUR -->\n  <section class=\"pad grayband\">\n    <span class=\"eyebrow section-k\">Data colour system<\u002Fspan>\n    <h2>Built for financial data<\u002Fh2>\n    <p class=\"lead\">Because our companies run on grants, budgets and savings, charts get a dedicated, brand-cohesive palette — categorical series, a loss-to-gain diverging scale, and fixed finance semantics.<\u002Fp>\n\n    <div class=\"blockgap\">\n      <div class=\"minittl\">Categorical — up to 8 series<\u002Fdiv>\n      <div class=\"viz-cats\">\n        <div class=\"c\" style=\"background:var(--viz-cat-1)\"><\u002Fdiv>\n        <div class=\"c\" style=\"background:var(--viz-cat-2)\"><\u002Fdiv>\n        <div class=\"c\" style=\"background:var(--viz-cat-3)\"><\u002Fdiv>\n        <div class=\"c\" style=\"background:var(--viz-cat-4)\"><\u002Fdiv>\n        <div class=\"c\" style=\"background:var(--viz-cat-5)\"><\u002Fdiv>\n        <div class=\"c\" style=\"background:var(--viz-cat-6)\"><\u002Fdiv>\n        <div class=\"c\" style=\"background:var(--viz-cat-7)\"><\u002Fdiv>\n        <div class=\"c\" style=\"background:var(--viz-cat-8)\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"blockgap\">\n      <div class=\"minittl\">Diverging — loss ↔ gain<\u002Fdiv>\n      <div class=\"div\">\n        <span style=\"background:var(--viz-div-neg-3)\"><\u002Fspan>\n        <span style=\"background:var(--viz-div-neg-2)\"><\u002Fspan>\n        <span style=\"background:var(--viz-div-neg-1)\"><\u002Fspan>\n        <span style=\"background:var(--viz-div-mid)\"><\u002Fspan>\n        <span style=\"background:var(--viz-div-pos-1)\"><\u002Fspan>\n        <span style=\"background:var(--viz-div-pos-2)\"><\u002Fspan>\n        <span style=\"background:var(--viz-div-pos-3)\"><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"divlbl\"><span style=\"color:var(--viz-negative)\">−18% under budget<\u002Fspan><span style=\"color:var(--viz-positive)\">+18% surplus<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"charts\">\n      <div class=\"panel\">\n        <p class=\"pt\">Budget variance by month<\u002Fp>\n        <svg viewBox=\"0 0 340 150\" width=\"100%\" height=\"150\">\n          <line x1=\"30\" y1=\"20\" x2=\"330\" y2=\"20\" stroke=\"var(--viz-grid)\"><\u002Fline>\n          <line x1=\"30\" y1=\"56\" x2=\"330\" y2=\"56\" stroke=\"var(--viz-grid)\"><\u002Fline>\n          <line x1=\"30\" y1=\"128\" x2=\"330\" y2=\"128\" stroke=\"var(--viz-grid)\"><\u002Fline>\n          <line x1=\"30\" y1=\"66\" x2=\"330\" y2=\"66\" stroke=\"var(--viz-forecast)\" stroke-width=\"1.5\" stroke-dasharray=\"4 3\"><\u002Fline>\n          <line x1=\"30\" y1=\"92\" x2=\"330\" y2=\"92\" stroke=\"var(--viz-grid-strong)\" stroke-width=\"1.5\"><\u002Fline>\n          <rect x=\"36\" y=\"61\" width=\"22\" height=\"31\" rx=\"2\" fill=\"var(--viz-positive)\"><\u002Frect>\n          <rect x=\"72\" y=\"71\" width=\"22\" height=\"21\" rx=\"2\" fill=\"var(--viz-positive)\"><\u002Frect>\n          <rect x=\"108\" y=\"92\" width=\"22\" height=\"13\" rx=\"2\" fill=\"var(--viz-negative)\"><\u002Frect>\n          <rect x=\"144\" y=\"53\" width=\"22\" height=\"39\" rx=\"2\" fill=\"var(--viz-positive)\"><\u002Frect>\n          <rect x=\"180\" y=\"92\" width=\"22\" height=\"26\" rx=\"2\" fill=\"var(--viz-negative)\"><\u002Frect>\n          <rect x=\"216\" y=\"76\" width=\"22\" height=\"16\" rx=\"2\" fill=\"var(--viz-positive)\"><\u002Frect>\n          <rect x=\"252\" y=\"45\" width=\"22\" height=\"47\" rx=\"2\" fill=\"var(--viz-positive)\"><\u002Frect>\n          <rect x=\"288\" y=\"92\" width=\"22\" height=\"8\" rx=\"2\" fill=\"var(--viz-negative)\"><\u002Frect>\n          <text x=\"14\" y=\"24\" font-size=\"9\" fill=\"var(--viz-axis-label)\">+18<\u002Ftext>\n          <text x=\"18\" y=\"95\" font-size=\"9\" fill=\"var(--viz-axis-label)\">0<\u002Ftext>\n          <text x=\"10\" y=\"131\" font-size=\"9\" fill=\"var(--viz-axis-label)\">−12<\u002Ftext>\n          <g font-size=\"9\" fill=\"var(--viz-axis-label)\" text-anchor=\"middle\">\n            <text x=\"47\" y=\"144\">J<\u002Ftext><text x=\"83\" y=\"144\">F<\u002Ftext><text x=\"119\" y=\"144\">M<\u002Ftext><text x=\"155\" y=\"144\">A<\u002Ftext>\n            <text x=\"191\" y=\"144\">M<\u002Ftext><text x=\"227\" y=\"144\">J<\u002Ftext><text x=\"263\" y=\"144\">J<\u002Ftext><text x=\"299\" y=\"144\">A<\u002Ftext>\n          <\u002Fg>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"panel\">\n        <p class=\"pt\">Grant volume by sector<\u002Fp>\n        <svg viewBox=\"0 0 120 120\" width=\"118\" height=\"118\" style=\"display:block;margin:0 auto\">\n          <g transform=\"rotate(-90 60 60)\" fill=\"none\" stroke-width=\"20\">\n            <circle cx=\"60\" cy=\"60\" r=\"42\" stroke=\"var(--viz-cat-1)\" stroke-dasharray=\"90 174\"><\u002Fcircle>\n            <circle cx=\"60\" cy=\"60\" r=\"42\" stroke=\"var(--viz-cat-2)\" stroke-dasharray=\"63 201\" stroke-dashoffset=\"-90\"><\u002Fcircle>\n            <circle cx=\"60\" cy=\"60\" r=\"42\" stroke=\"var(--viz-cat-3)\" stroke-dasharray=\"47 217\" stroke-dashoffset=\"-153\"><\u002Fcircle>\n            <circle cx=\"60\" cy=\"60\" r=\"42\" stroke=\"var(--viz-cat-4)\" stroke-dasharray=\"37 227\" stroke-dashoffset=\"-200\"><\u002Fcircle>\n            <circle cx=\"60\" cy=\"60\" r=\"42\" stroke=\"var(--viz-cat-5)\" stroke-dasharray=\"27 237\" stroke-dashoffset=\"-237\"><\u002Fcircle>\n          <\u002Fg>\n          <text x=\"60\" y=\"56\" text-anchor=\"middle\" font-size=\"17\" font-weight=\"600\" fill=\"var(--text-strong)\">€48M<\u002Ftext>\n          <text x=\"60\" y=\"70\" text-anchor=\"middle\" font-size=\"8\" fill=\"var(--viz-axis-label)\">total<\u002Ftext>\n        <\u002Fsvg>\n        <div class=\"legend\">\n          <span class=\"lg\"><span class=\"d\" style=\"background:var(--viz-cat-1)\"><\u002Fspan>Care <span class=\"v\">34%<\u002Fspan><\u002Fspan>\n          <span class=\"lg\"><span class=\"d\" style=\"background:var(--viz-cat-2)\"><\u002Fspan>Health <span class=\"v\">24%<\u002Fspan><\u002Fspan>\n          <span class=\"lg\"><span class=\"d\" style=\"background:var(--viz-cat-3)\"><\u002Fspan>NGOs <span class=\"v\">18%<\u002Fspan><\u002Fspan>\n          <span class=\"lg\"><span class=\"d\" style=\"background:var(--viz-cat-4)\"><\u002Fspan>Munic. <span class=\"v\">14%<\u002Fspan><\u002Fspan>\n          <span class=\"lg\"><span class=\"d\" style=\"background:var(--viz-cat-5)\"><\u002Fspan>Edu <span class=\"v\">10%<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TYPE -->\n  <section class=\"pad typespec\">\n    <span class=\"eyebrow section-k\">Typography<\u002Fspan>\n    <h2>Geometric meets humanist<\u002Fh2>\n    <div class=\"type-display\">Sora &amp; Hanken Grotesk<\u002Fdiv>\n    <div class=\"type-meta\">display + text · the digital and the human voice<\u002Fdiv>\n    <div class=\"type-pair\">\n      <div>\n        <div class=\"type-tag\">Sora — display<\u002Fdiv>\n        <div class=\"type-body\" style=\"font-family:var(--font-display); font-size:22px; font-weight:600; color:var(--text-strong); line-height:1.2;\">Headlines, big numbers and the wordmark voice.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"type-tag\">Hanken Grotesk — text<\u002Fdiv>\n        <div class=\"type-body\">Readable, warm body text for everything our partners need to understand — set at a comfortable measure and rhythm.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- COMPONENTS -->\n  <section class=\"pad\">\n    <span class=\"eyebrow section-k\">In the product<\u002Fspan>\n    <h2>Consistent, accessible UI<\u002Fh2>\n    <p class=\"lead\">A shared component library carries the brand into every portfolio product — buttons, status badges, forms and data tables.<\u002Fp>\n    <div class=\"btnrow\">\n      <span class=\"b b-pri\">Get in touch<\u002Fspan>\n      <span class=\"b b-acc\">Review application<\u002Fspan>\n      <span class=\"b b-sec\">New shift<\u002Fspan>\n      <span class=\"b b-ghost\">Cancel<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"badges\">\n      <span class=\"bd\" style=\"background:var(--status-success-bg); color:var(--status-success-fg)\"><span class=\"dot\"><\u002Fspan>Grant paid<\u002Fspan>\n      <span class=\"bd\" style=\"background:var(--status-warning-bg); color:var(--status-warning-fg)\"><span class=\"dot\"><\u002Fspan>Pending review<\u002Fspan>\n      <span class=\"bd\" style=\"background:var(--status-danger-bg); color:var(--status-danger-fg)\"><span class=\"dot\"><\u002Fspan>Flagged<\u002Fspan>\n      <span class=\"bd\" style=\"background:var(--navy-100); color:var(--navy-700)\">Social care<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer class=\"foot\">\n    <div>\n      <img src=\"68434d6c-da4e-4767-b165-4810c96feea6\" alt=\"PubliX Group\">\n      <p>Building better public services through digital innovation.<\u002Fp>\n      <div class=\"org\">Org. 559485-5487 · Backed by Aspira Partners<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"addr\">\n      Kungsgatan 37, 8tr<br>\n      111 56 Stockholm, Sweden<br>\n      publixgroup.io\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
